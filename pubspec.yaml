name: smartexit
description: A production-ready Flutter mobile application for the Nairobi Expressway toll system.

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  dio: ^5.4.1
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  flutter_secure_storage: ^9.0.0
  mobile_scanner: ^5.2.0
  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.1.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
